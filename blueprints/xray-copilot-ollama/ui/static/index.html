<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chest X-ray Copilot</title>
  <link rel="icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/suse.css" />
  <link rel="stylesheet" href="/xray.css" />
</head>
<body>
  <header>
    <img src="/favicon.svg" alt="SUSE" />
    <h1>Chest X-ray Copilot</h1>
    <span class="tag">demo only · not for clinical use</span>
  </header>

  <main>
    <!-- Controls -->
    <section class="card">
      <h2>Analyse a chest X-ray</h2>

      <label>X-ray image</label>
      <input id="file" type="file" accept="image/*" />

      <label>Or pick a sample</label>
      <div id="samples" class="samples muted">Loading samples…</div>

      <label>Model</label>
      <select id="model"></select>
      <div id="model-status" class="muted"></div>

      <label>Question (optional)</label>
      <textarea id="question" placeholder="e.g. Is there any sign of pneumonia or effusion?"></textarea>

      <button class="primary" id="run">Analyse</button>
      <div id="analyze-error" class="error"></div>
    </section>

    <!-- Results -->
    <section>
      <div class="card section">
        <h2>Selected image</h2>
        <img id="preview" class="preview-img" alt="" hidden />
        <div id="preview-hint" class="muted">Upload or pick a sample X-ray to analyse.</div>
      </div>

      <div class="card section">
        <h2>Analysis</h2>
        <div id="analysis" class="muted">Run an analysis to see the model's report here.</div>
        <div id="store-status" class="muted"></div>
        <button id="find-similar" class="primary" style="max-width:220px" hidden>Find similar X-rays</button>
      </div>

      <div class="card section">
        <h2>Search indexed X-rays</h2>
        <div class="row">
          <input id="query" placeholder="Semantic search, e.g. 'left pleural effusion'" />
          <button class="primary" id="search" style="margin-top:0; max-width:120px;">Search</button>
        </div>
        <div id="search-error" class="error"></div>
        <div id="hits"></div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
