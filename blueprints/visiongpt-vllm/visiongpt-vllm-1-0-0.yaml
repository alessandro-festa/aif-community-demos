apiVersion: ai-factory.suse.com/v1alpha1
kind: Blueprint
metadata:
  labels:
    ai-factory.suse.com/blueprint-name: visiongpt-vllm
    ai-factory.suse.com/blueprint-version: 1.0.0
  name: visiongpt-vllm-1-0-0
# VisionGPT (vLLM) — LLM-assisted navigation hazard detection on GPU.
# A SUSE derivation of AIS-Clemson/VisionGPT, reimagined as a vision-language
# pipeline: a local demo UI samples frames from a walking video and sends each to
# a vision-language model served by vLLM (Qwen/Qwen2.5-VL-3B-Instruct) over the
# OpenAI-compatible API, which returns a per-frame danger score + short reason.
# Requires a real NVIDIA GPU node (and the GPU Operator). Same model as the
# visiongpt-ollama variant (which runs the same model on CPU via Ollama).
spec:
  source: Custom  # community, unsupported demo blueprint (CRD enum has no "Community")
  displayName: VisionGPT (vLLM, GPU)
  version: 1.0.0
  description: |-
    LLM-assisted navigation hazard detection — a SUSE / vision-language derivation
    of AIS-Clemson's VisionGPT. vLLM serves Qwen2.5-VL-3B-Instruct on an NVIDIA GPU;
    a local SUSE-styled UI samples frames from a walking video (bundled sample or
    your upload) and asks the model, per frame, for a danger score (0/1) and a short
    reason, at a selectable sensitivity (low/normal/high).

    Deploys the vLLM serving stack (serving engine + router). The UI runs locally via
    the Blueprint Marketplace, reaching the vLLM OpenAI-compatible endpoint over
    kubectl port-forward. For a CPU version of the same model via Ollama, use the
    "VisionGPT (Ollama, CPU)" blueprint.

    Prerequisites: the SUSE AI Factory operator, the application-collection
    ClusterRepo (+ credentials secret), a default StorageClass, and a node with a
    real NVIDIA GPU plus the GPU Operator / device plugin. The model
    (Qwen/Qwen2.5-VL-3B-Instruct) is downloaded on first start.
  components:
  - chartName: vllm
    chartRepo: application-collection
    chartVersion: 0.1.10
    values:
      servingEngineSpec:
        runtimeClassName: nvidia
        modelSpec:
          - name: qwen25-vl-3b
            registry: dp.apps.rancher.io
            repository: containers/vllm-openai
            tag: "0.19.0-5.29"
            modelURL: Qwen/Qwen2.5-VL-3B-Instruct
            replicaCount: 1
            requestCPU: 6
            requestMemory: "16Gi"
            requestGPU: 1
            pvcStorage: "50Gi"
            vllmConfig:
              maxModelLen: 32768
              dtype: bfloat16
              gpuMemoryUtilization: 0.9
              # Vision flags: Qwen needs remote code; cap images/prompt.
              extraArgs:
              - "--trust-remote-code"
              - "--limit-mm-per-prompt.image=2"
      routerSpec:
        enableRouter: true
        serviceType: ClusterIP
        containerPort: 8000
        servicePort: 80
