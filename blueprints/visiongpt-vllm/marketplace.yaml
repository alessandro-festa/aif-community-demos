id: visiongpt-vllm
displayName: VisionGPT (vLLM, GPU)
description: >-
  LLM-assisted navigation hazard detection — a SUSE / vision-language derivation of
  AIS-Clemson's VisionGPT. vLLM serves Qwen2.5-VL-3B-Instruct on an NVIDIA GPU; a local
  UI samples frames from a walking video and returns a per-frame danger score + short
  reason at a selectable sensitivity. Requires a real GPU node.
category: safety
tags: [visiongpt, vllm, qwen2.5-vl, vision, gpu]
blueprintFile: visiongpt-vllm-1-0-0.yaml
prerequisites:
  - {id: aif,   label: "SUSE AI Factory (Blueprint CRD)", kind: crd, name: blueprints.ai-factory.suse.com}
  - {id: sc,    label: "Default StorageClass",            kind: default-storageclass}
  - {id: certm, label: "cert-manager",                    kind: namespace, name: cert-manager}
  - {id: gpuop, label: "GPU Operator",                    kind: namespace, name: gpu-operator}
localFrontend:
  dir: ui
  runtime: python
  install:
    - "-r ui/requirements.txt"
  entry: app.main:app
  port: 8000
  openPath: /
  env:
    OPENAI_BASE_URL: "http://localhost:8000/v1"
    VLM_MODEL: "Qwen/Qwen2.5-VL-3B-Instruct"
    OPENAI_API_KEY: "EMPTY"
    SENSITIVITY: "normal"
  portForwards:
    # The vLLM production-stack chart exposes the OpenAI API on the router service
    # (named <release>-router-service; the operator names the release "vllm").
    - {name: vllm, service: vllm-router-service, local: 8000, remote: 80}
guide:
  - title: Import the blueprint
    body: |
      Applies the VisionGPT (vLLM) Blueprint CR to the selected cluster. This adds it
      to the SUSE AI Factory catalog — it does not deploy anything yet.
    action: {type: import}
  - title: Create the AIWorkload (SUSE AI Factory UI)
    body: |
      In the SUSE AI Factory UI, go to **Blueprints → VisionGPT (vLLM, GPU) → Create
      AIWorkload**, choose a target **namespace**, and deploy. This needs a node with a
      **real NVIDIA GPU** and the GPU Operator. The serving pod downloads
      `Qwen/Qwen2.5-VL-3B-Instruct` on first start (several GB) — wait until the vLLM
      router and serving pods are Ready. Enter the namespace you chose below.
    action: {type: namespace-input}
  - title: Launch the demo UI
    body: |
      Starts `kubectl port-forward` to the vLLM router (`vllm-router-service:80`) and
      runs the VisionGPT UI locally. If your Helm release name isn't `vllm`, adjust the
      port-forward service name to `<release>-router-service`.
    action: {type: start-frontend}
  - title: Analyse a walk
    body: |
      Open the UI, pick the bundled **walk.mp4** (or upload your own walking video),
      choose a sensitivity, and hit **Analyse**. Each sampled frame gets a danger score
      + short reason. On GPU this is fast (sub-second to a couple of seconds per frame).
    action: {type: open-url, url: "http://localhost:8000"}
