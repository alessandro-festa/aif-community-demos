id: fraud-detection-ollama
displayName: Fraud / AML Detection (Ollama, CPU)
description: >-
  Financial-crime / money-laundering / anomaly detection. Airflow generates a synthetic
  fraud graph (SantanderAI/gen-fraud-graph), trains an XGBoost classifier, and indexes
  behavioural vectors in Milvus for anomaly detection; a local LLM (Ollama, qwen2.5:1.5b)
  acts as an AML analyst explaining flagged accounts. All from the SUSE Application
  Collection. With thanks to SantanderAI/gen-fraud-graph for the inspiration.
category: anomaly-detection
tags: [fraud, aml, airflow, xgboost, ollama, milvus, anomaly]
blueprintFile: fraud-detection-ollama-1-0-0.yaml
prerequisites:
  - {id: aif,   label: "SUSE AI Factory (Blueprint CRD)", kind: crd, name: blueprints.ai-factory.suse.com}
  - {id: sc,    label: "Default StorageClass",            kind: default-storageclass}
  - {id: certm, label: "cert-manager",                    kind: namespace, name: cert-manager}
localFrontend:
  dir: ui
  runtime: python
  install:
    - "-r ui/requirements.txt"
  entry: app.main:app
  port: 8000
  openPath: /
  env:
    POSTGRES_URI: "postgresql://fraud:fraud@localhost:5432/fraud"
    MILVUS_URI: "http://localhost:19530"
    OPENAI_BASE_URL: "http://localhost:11434/v1"
    LLM_MODEL: "{{MODEL}}"
    OPENAI_API_KEY: "EMPTY"
  portForwards:
    - {name: fraud-db, service: fraud-db, local: 5432, remote: 5432}
    - {name: milvus, service: milvus, local: 19530, remote: 19530}
    - {name: ollama, service: ollama, local: 11434, remote: 11434}
# In-cluster component UIs the marketplace can port-forward on demand (button
# enabled only once the service is Ready).
componentUIs:
  - {name: airflow, label: "Airflow UI", service: apache-airflow-api-server, port: 8080, path: /}
# Let the user pick the AML-analyst LLM size at import + frontend start (CPU).
modelSizes:
  default: small
  envKey: LLM_MODEL
  replace: "{{MODEL}}"
  options:
    - {id: small, label: "1.5B — faster (CPU)", model: "qwen2.5:1.5b"}
    - {id: large, label: "3B — higher quality", model: "qwen2.5:3b"}
guide:
  - title: Import the blueprint
    body: |
      Applies the Fraud / AML (Ollama) Blueprint CR to the selected cluster. This adds it to
      the SUSE AI Factory catalog — it does not deploy anything yet.
    action: {type: import}
  - title: Create the AIWorkload (SUSE AI Factory UI)
    body: |
      In the SUSE AI Factory UI, go to **Blueprints → Fraud / AML Detection (Ollama) →
      Create AIWorkload**, choose a target **namespace**, and deploy. Wait for PostgreSQL,
      Milvus, Ollama and Airflow to be Ready — the Airflow scheduler installs the pipeline's
      Python libraries on first start (pandas/networkx/xgboost/gen-fraud-graph), so give it a
      few minutes. Enter the namespace you chose below.
    action: {type: namespace-input}
  - title: Run the pipeline in Airflow
    body: |
      Use the **Open Airflow UI** button below (enabled once Airflow is Ready) to reach the
      Airflow web UI (log in with **admin / admin**). Then trigger these DAGs **in order**,
      waiting for each to finish before starting the next:

      1. `generate_fraud_dataset` — synthetic fraud graph → PostgreSQL.
      2. `engineer_and_train` — features → XGBoost → account scores + model metrics.
      3. `flag_and_anomaly` — Milvus anomaly index → flagged accounts.

      Raise `SCALE_FACTOR` on the blueprint for a bigger dataset.
  - title: Launch the investigator UI
    body: |
      Starts `kubectl port-forward` to Postgres (5432), Milvus (19530) and Ollama (11434) and
      runs the SUSE investigator dashboard locally.
    action: {type: start-frontend}
  - title: Investigate flagged accounts
    body: |
      Open the dashboard: review dataset stats + model metrics + flagged accounts, drill into
      an account, and click **Explain with LLM** for an AML analyst verdict (typology, risk
      rationale, recommended action).
    action: {type: open-url, url: "http://localhost:8000"}
