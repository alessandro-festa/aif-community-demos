apiVersion: ai-factory.suse.com/v1alpha1
kind: Blueprint
metadata:
  labels:
    ai-factory.suse.com/blueprint-name: litellm-guardrails
    ai-factory.suse.com/blueprint-version: 1.0.0
  name: litellm-guardrails-1-0-0
# LiteLLM Guardrails — a guarded LLM gateway demo. Chat traffic flows:
#   Open WebUI  ->  LiteLLM (guardrails applied)  ->  Ollama (small local model)
# so PII is masked/blocked (Presidio), secrets are redacted, and prompt-injection
# is detected BEFORE anything reaches the model.
#
# Components (registry sources):
#   * ollama      — application-collection (dp.apps.rancher.io), CPU, llama3.2:1b
#   * litellm     — suse-ai-registry (registry.suse.com/ai/charts), image
#                   registry.suse.com/ai/containers/litellm-database (needs the
#                   application-collection pull secret). Bundled standalone Postgres.
#   * open-webui  — application-collection, pointed at LiteLLM's OpenAI endpoint.
#   * presidio    — analyzer + anonymizer (mcr.microsoft.com, the one non-SUSE
#                   dependency; no SUSE image exists) deployed via litellm
#                   extraResources; always present so the guardrail wizard only has
#                   to inject proxy config.
#
# The Blueprint Marketplace shows a pre-import WIZARD (see marketplace.yaml) that
# injects the selected guardrails into the litellm component's proxy_config before
# this CR is applied. The baseline below ships with guardrails: [] (none active).
spec:
  source: Custom  # community, unsupported demo blueprint (CRD enum has no "Community")
  displayName: LiteLLM Guardrails (Ollama + Open WebUI)
  version: 1.0.0
  description: |
    A guarded LLM gateway: Open WebUI talks to a LiteLLM proxy which applies
    guardrails (Presidio PII masking/blocking, secret redaction, prompt-injection
    detection) and forwards to a local Ollama model (llama3.2:1b, CPU). All chat
    goes through LiteLLM, so guardrails are enforced before the model sees anything.

    LiteLLM comes from the SUSE AI registry (registry.suse.com/ai); its image is
    pulled with the application-collection secret. Presidio analyzer/anonymizer are
    the only non-SUSE images (mcr.microsoft.com) and are deployed alongside LiteLLM.

    Prerequisites (install on the target cluster BEFORE creating an AIWorkload):
      * SUSE AI Factory operator (owns the Blueprint / AIWorkload CRDs).
      * The application-collection ClusterRepo + credentials secret (also used as
        the pull secret for the LiteLLM image) and the suse-ai-registry ClusterRepo.
      * A default StorageClass (Ollama, LiteLLM's Postgres, and Open WebUI use PVCs).
      * cert-manager.

    Import via the Blueprint Marketplace (choose guardrails in the wizard), then
    create an AIWorkload from this Blueprint in the AI Factory UI. When the pods are
    Ready, open Open WebUI from the marketplace guide and chat — try a prompt with an
    email address or credit-card number and watch the guardrail mask or block it.
  components:
  # ----------------------------------------------------------------------------
  # Ollama — small local model (CPU). Reachable at http://ollama:11434.
  # ----------------------------------------------------------------------------
  - chartName: ollama
    chartRepo: application-collection
    chartVersion: 1.55.0
    values:
      fullnameOverride: ollama
      image:
        pullPolicy: IfNotPresent
        registry: dp.apps.rancher.io
        repository: containers/ollama
        tag: 0.21.2-11.48
      ollama:
        gpu:
          enabled: false
          draEnabled: false
        models:
          # A small, CPU-friendly chat model — the demo is about the guardrails,
          # not the model.
          pull:
          - llama3.2:1b
          run:
          - llama3.2:1b
        port: 11434
      persistentVolume:
        enabled: true
        accessModes:
        - ReadWriteOnce
        size: 20Gi
      resources:
        limits: {}
        requests: {}
      runtimeClassName: ""
      service:
        port: 11434
        type: ClusterIP
  # ----------------------------------------------------------------------------
  # LiteLLM — the guarded OpenAI-compatible gateway. Reachable at http://litellm:4000.
  # proxy_config is rendered to the proxy's config.yaml. The marketplace wizard
  # appends guardrails / callbacks into this block at import time.
  # Presidio analyzer + anonymizer ride along as extraResources (always present).
  # ----------------------------------------------------------------------------
  - chartName: litellm
    chartRepo: suse-ai-registry
    chartVersion: 1.81.13
    values:
      fullnameOverride: litellm
      # NOTE: the SUSE AI litellm-database image (registry.suse.com/ai) is
      # published amd64-only, so it fails with "no match for platform in manifest"
      # on arm64 clusters (e.g. Apple-silicon lima VMs). The upstream image is
      # multi-arch (linux/amd64 + linux/arm64); use it for arm64 testing. Switch
      # back to registry.suse.com/ai/containers/litellm-database:v1.81.13 on amd64.
      image:
        registry: ghcr.io
        repository: berriai/litellm-database
        tag: main-stable
        pullPolicy: IfNotPresent
      # The upstream ghcr.io image is public, so the application-collection pull
      # secret below is harmless/unused for it (kept for the amd64 SUSE image).
      imagePullSecrets:
      - application-collection
      # Demo master key — the chart creates a <fullname>-masterkey secret and wires
      # it in as PROXY_MASTER_KEY. Open WebUI uses the same value to call the proxy.
      masterkey: sk-guardrails-demo
      service:
        type: ClusterIP
        port: 4000
      # Bundled single-node Postgres (the litellm-database image runs prisma migrations).
      db:
        deployStandalone: true
        database: litellm
      postgresql:
        architecture: standalone
        auth:
          username: litellm
          database: litellm
          password: ChangeMe-litellm-db-password
          postgres-password: ChangeMe-litellm-db-password
      # PRESIDIO_* point the presidio guardrail at the sidecar services below.
      envVars:
        PRESIDIO_ANALYZER_API_BASE: "http://presidio-analyzer:3000"
        PRESIDIO_ANONYMIZER_API_BASE: "http://presidio-anonymizer:3000"
      proxy_config:
        general_settings:
          master_key: os.environ/PROXY_MASTER_KEY
          store_model_in_db: false
        litellm_settings:
          drop_params: true
        model_list:
        - model_name: llama-3.2-1b
          litellm_params:
            model: ollama_chat/llama3.2:1b
            api_base: http://ollama:11434
        # Baseline: no guardrails. The marketplace wizard appends entries here
        # (Presidio PII mask/block, hide-secrets) and callbacks under
        # litellm_settings (prompt-injection) before this CR is applied.
        guardrails: []
      # Presidio PII engine — analyzer detects entities, anonymizer masks them.
      # Public Microsoft images (no SUSE equivalent). Always deployed so selecting
      # a Presidio guardrail in the wizard needs only a config change.
      extraResources:
      - apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: presidio-analyzer
          labels:
            app: presidio-analyzer
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: presidio-analyzer
          template:
            metadata:
              labels:
                app: presidio-analyzer
            spec:
              containers:
              - name: presidio-analyzer
                image: mcr.microsoft.com/presidio-analyzer:2.2.362
                ports:
                - containerPort: 3000
                readinessProbe:
                  httpGet:
                    path: /health
                    port: 3000
                  initialDelaySeconds: 20
                  periodSeconds: 10
                resources:
                  requests:
                    cpu: 100m
                    memory: 512Mi
      - apiVersion: v1
        kind: Service
        metadata:
          name: presidio-analyzer
          labels:
            app: presidio-analyzer
        spec:
          selector:
            app: presidio-analyzer
          ports:
          - port: 3000
            targetPort: 3000
      - apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: presidio-anonymizer
          labels:
            app: presidio-anonymizer
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: presidio-anonymizer
          template:
            metadata:
              labels:
                app: presidio-anonymizer
            spec:
              containers:
              - name: presidio-anonymizer
                image: mcr.microsoft.com/presidio-anonymizer:2.2.362
                ports:
                - containerPort: 3000
                readinessProbe:
                  httpGet:
                    path: /health
                    port: 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
      - apiVersion: v1
        kind: Service
        metadata:
          name: presidio-anonymizer
          labels:
            app: presidio-anonymizer
        spec:
          selector:
            app: presidio-anonymizer
          ports:
          - port: 3000
            targetPort: 3000
  # ----------------------------------------------------------------------------
  # Open WebUI — the chat frontend. Points ONLY at LiteLLM's OpenAI endpoint so
  # every message is guarded. Reachable at http://open-webui (service port 80).
  # ----------------------------------------------------------------------------
  - chartName: open-webui
    chartRepo: application-collection
    chartVersion: 8.19.1
    values:
      fullnameOverride: open-webui
      image:
        pullPolicy: IfNotPresent
        registry: dp.apps.rancher.io
        repository: containers/open-webui
        tag: 0.6.41-14.20
      global:
        tls:
          source: suse-private-ai
          issuerName: suse-private-ai
      # Talk to LiteLLM only (not Ollama directly) so guardrails always apply.
      ollama:
        enabled: false
      ollamaUrls: []
      # NOTE: this open-webui chart (8.19.1) does NOT translate the
      # enableOpenaiApi / openaiBaseApiUrls / openaiApiKeys values into env vars,
      # so the LiteLLM connection must be set via extraEnvVars using Open WebUI's
      # own env names (OPENAI_API_BASE_URLS / OPENAI_API_KEYS, ';'-separated for
      # multiples). ENABLE_PERSISTENT_CONFIG=False makes these apply on every boot
      # rather than only seeding the DB on first start, so the connection is always
      # pre-wired and the user can chat immediately.
      extraEnvVars:
      - name: WEBUI_AUTH
        value: "False"
      - name: ENABLE_PERSISTENT_CONFIG
        value: "False"
      - name: ENABLE_OLLAMA_API
        value: "False"
      - name: ENABLE_OPENAI_API
        value: "True"
      - name: OPENAI_API_BASE_URLS
        value: http://litellm:4000/v1
      - name: OPENAI_API_KEYS
        value: sk-guardrails-demo
      - name: DEFAULT_MODELS
        value: llama-3.2-1b
      ingress:
        enabled: false
      persistence:
        enabled: true
        accessModes:
        - ReadWriteOnce
        size: 5Gi
      service:
        type: ClusterIP
        port: 80
        containerPort: 8080
