id: insurance-support-vllm
displayName: Insurance Support Copilot (vLLM, GPU)
description: >-
  A customer-support automation demo for an insurance company. Airflow generates a
  synthetic support dataset (customers, families, policies, claims, tickets) into
  Postgres and a Milvus semantic index; a local chat UI lets a customer upload an
  accident photo, open/close tickets, and see similar past cases — redacted (PII
  removed) with Presidio. Chat + vision via Qwen2.5-VL on vLLM (GPU). Demo only.
category: customer-support
tags: [customer-support, insurance, chatbot, airflow, postgres, milvus, presidio, vllm, gpu, vision]
blueprintFile: insurance-support-vllm-1-0-0.yaml
prerequisites:
  - {id: aif,   label: "SUSE AI Factory (Blueprint CRD)", kind: crd, name: blueprints.ai-factory.suse.com}
  - {id: sc,    label: "Default StorageClass",            kind: default-storageclass}
  - {id: certm, label: "cert-manager",                    kind: namespace, name: cert-manager}
  - {id: gpuop, label: "GPU Operator",                    kind: namespace, name: gpu-operator}
importWizard:
  title: "Synthetic dataset size"
  body: >-
    Choose how many synthetic support tickets the Airflow `generate_dataset` DAG
    creates. Larger sets make "similar case" search richer but take longer. Leave
    blank for the default (400).
  targetComponent: apache-airflow
  inputs:
    - id: n-tickets
      label: "Number of synthetic tickets"
      description: "Injected as the Airflow N_TICKETS env. Default 400 if left blank."
      placeholder: "400"
      secret: false
      required: false
      replace: "{{N_TICKETS}}"
componentUIs:
  - {name: airflow, label: "Airflow UI", service: apache-airflow-api-server, port: 8080, path: /}
localFrontend:
  dir: ui
  runtime: python
  install:
    - "torch==2.5.1 --index-url https://download.pytorch.org/whl/cpu"
    - "-r ui/requirements.txt"
    - "https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl"
  entry: app.main:app
  port: 8000
  openPath: /
  env:
    # Chat/vision via the vLLM router (forwarded to :8011); embeddings via Ollama.
    CHAT_BASE_URL: "http://localhost:8011/v1"
    CHAT_MODEL: "Qwen/Qwen2.5-VL-7B-Instruct"
    VISION_MODEL: "Qwen/Qwen2.5-VL-7B-Instruct"
    EMBED_BASE_URL: "http://localhost:11434/v1"
    EMBED_MODEL: "nomic-embed-text"
    OPENAI_API_KEY: "EMPTY"
    MILVUS_URI: "http://localhost:19530"
    POSTGRES_URI: "postgresql://insurance:insurance@localhost:5433/insurance"
    CASES_COLLECTION: "support_cases"
    CLIP_MODEL: "clip-ViT-B-32"
  portForwards:
    - {name: vllm,       service: vllm-router-service, local: 8011, remote: 80}
    - {name: ollama,     service: ollama,              local: 11434, remote: 11434}
    - {name: milvus,     service: milvus,              local: 19530, remote: 19530}
    - {name: support-db, service: support-db,          local: 5433,  remote: 5432}
guide:
  - title: Choose dataset size & import
    body: |
      Optionally set the **number of synthetic tickets**, then import. **Importing**
      applies the Blueprint CR to the selected cluster — it adds the Blueprint to the
      SUSE AI Factory catalog, it does not deploy anything yet.
    action: {type: import}
  - title: Create the AIWorkload (SUSE AI Factory UI)
    body: |
      In the SUSE AI Factory UI, go to **Blueprints → Insurance Support Copilot (vLLM,
      GPU) → Create AIWorkload**, choose a target **namespace**, and deploy. This needs
      a node with a **real NVIDIA GPU** and the GPU Operator. vLLM downloads
      `Qwen/Qwen2.5-VL-7B-Instruct` on first start (several GB); Ollama pulls
      `nomic-embed-text`. Wait for Postgres, Milvus, vLLM, Ollama and Airflow to be
      Ready, then enter the namespace below.
    action: {type: namespace-input}
  - title: Run the Airflow pipeline
    body: |
      Open the **Airflow UI** (button below) and log in with **admin / admin**, then
      trigger the DAGs in order:

      1. **generate_dataset** — synthesises the insurance data into Postgres.
      2. **index_cases** — embeds resolved/closed tickets into Milvus (semantic search).

      (The vLLM variant applies the support-agent persona as a system prompt, so there
      is no `customize_model` DAG here.)
  - title: Launch the demo UI
    body: |
      Starts `kubectl port-forward` to the vLLM router, Ollama, Milvus, and Postgres,
      then runs the Insurance Support Copilot UI locally. If your Helm release name
      isn't `vllm`, adjust the port-forward service name to `<release>-router-service`.
    action: {type: start-frontend}
  - title: Chat, open a ticket & find similar cases
    body: |
      Open the UI and try the assistant. Attach an accident photo with the 📎 button,
      describe what happened, and ask it to open a ticket — it proposes the action and
      you **confirm** it (which writes to Postgres). Use the semantic search box or ask
      for "similar cases"; every retrieved case is **redacted** before it's shown.

      Try these (Copy → paste into the chat or search box):

      ```
      A stone cracked my windshield on the motorway. Can I claim for a repair?
      ```

      ```
      A burst pipe flooded my kitchen last night — please open a high priority ticket.
      ```

      ```
      water damage claim that was paid
      ```
    action: {type: open-url, url: "http://localhost:8000"}
