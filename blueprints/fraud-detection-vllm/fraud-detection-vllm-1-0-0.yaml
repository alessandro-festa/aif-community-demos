apiVersion: ai-factory.suse.com/v1alpha1
kind: Blueprint
metadata:
  labels:
    ai-factory.suse.com/blueprint-name: fraud-detection-vllm
    ai-factory.suse.com/blueprint-version: 1.0.0
  name: fraud-detection-vllm-1-0-0
# Fraud / AML detection (vLLM, GPU).
# Same pipeline as the Ollama variant — Airflow generates a synthetic fraud graph
# (SantanderAI/gen-fraud-graph, Apache-2.0), loads PostgreSQL, trains XGBoost, indexes
# Milvus for anomaly detection — but the AML-analyst LLM is served by vLLM on a GPU
# (Qwen/Qwen2.5-3B-Instruct). Requires a real NVIDIA GPU node + the GPU Operator.
#
# Inspired by and with thanks to:
#   * SantanderAI/gen-fraud-graph  (Apache-2.0):  https://github.com/SantanderAI/gen-fraud-graph
#   * srinivas-gajulaa/genai-fraud-detection — the ML-score + LLM-analyst pattern.
spec:
  source: Custom  # community, unsupported demo blueprint (CRD enum has no "Community")
  displayName: Fraud / AML Detection (vLLM, GPU)
  version: 1.0.0
  description: |-
    Financial-crime / money-laundering / anomaly-detection pipeline. Apache Airflow
    generates and manipulates a synthetic fraud graph (SantanderAI/gen-fraud-graph,
    Apache-2.0), stores it in PostgreSQL, trains an XGBoost classifier on the labelled data,
    and indexes per-account behavioural feature vectors in Milvus for anomaly detection. A
    local SUSE-styled investigator UI uses an LLM served by vLLM (Qwen/Qwen2.5-3B-Instruct)
    as an AML analyst to classify + explain flagged cases.

    Thanks to SantanderAI/gen-fraud-graph (https://github.com/SantanderAI/gen-fraud-graph)
    for inspiring this blueprint, and to srinivas-gajulaa/genai-fraud-detection for the
    analyst-explanation pattern. gen-fraud-graph is Apache-2.0 and not an official Banco
    Santander product; this blueprint installs it from source in the Airflow pipeline.

    Requires: the SUSE AI Factory operator, the application-collection ClusterRepo
    (+ credentials secret), a default StorageClass, and a node with a real NVIDIA GPU plus
    the GPU Operator. The LLM model is downloaded on first start. Dataset size is controlled
    by SCALE_FACTOR (default 0.001).
  components:
  - chartName: postgresql
    chartRepo: application-collection
    chartVersion: 0.6.0
    values:
      fullnameOverride: fraud-db
      image:
        registry: dp.apps.rancher.io
        repository: containers/postgresql
      auth:
        database: fraud
        username: fraud
        password: fraud
        postgresPassword: fraudadmin
      primary:
        persistence:
          enabled: true
          size: 8Gi
  - chartName: milvus
    chartRepo: application-collection
    chartVersion: 5.0.22
    values:
      cluster:
        enabled: false
      image:
        all:
          pullPolicy: IfNotPresent
          registry: dp.apps.rancher.io
          repository: containers/milvus
          tag: 2.6.18-8.4
      etcd:
        enabled: true
        replicaCount: 1
      kafka:
        enabled: false
      minio:
        enabled: true
        mode: standalone
        name: minio
        replicas: 1
        rootPath: file
        users:
        - accessKey: minioadmin
          policy: consoleAdmin
          secretKey: minioadmin
      proxy:
        enabled: true
        http:
          enabled: true
      standalone:
        messageQueue: woodpecker
        persistence:
          enabled: true
          persistentVolumeClaim:
            accessModes: ReadWriteOnce
            size: 50Gi
      streaming:
        enabled: true
        woodpecker:
          embedded: true
          storage:
            type: minio
      service:
        port: 19530
        portName: milvus
        type: ClusterIP
  # ----------------------------------------------------------------------- #
  # vLLM — local LLM (AML analyst) served on an NVIDIA GPU.
  # ----------------------------------------------------------------------- #
  - chartName: vllm
    chartRepo: application-collection
    chartVersion: 0.1.10
    values:
      servingEngineSpec:
        runtimeClassName: nvidia
        modelSpec:
          - name: qwen25-3b
            registry: dp.apps.rancher.io
            repository: containers/vllm-openai
            tag: "0.19.0-5.29"
            modelURL: Qwen/Qwen2.5-3B-Instruct
            replicaCount: 1
            requestCPU: 6
            requestMemory: "16Gi"
            requestGPU: 1
            pvcStorage: "50Gi"
            vllmConfig:
              maxModelLen: 32768
              dtype: bfloat16
              gpuMemoryUtilization: 0.9
      routerSpec:
        enableRouter: true
        serviceType: ClusterIP
        containerPort: 8000
        servicePort: 80
  - chartName: apache-airflow
    chartRepo: application-collection
    chartVersion: 1.22.0
    values:
      executor: LocalExecutor
      redis:
        enabled: false
      flower:
        enabled: false
      # Custom Airflow image: built FROM the SUSE Application Collection apache-airflow
      # base (which ships without pip) with the DAG's Python libraries baked in. See the
      # ollama variant / blueprints/fraud-detection-vllm/airflow-image/Dockerfile. This
      # replaces the too-slow-to-converge _PIP_ADDITIONAL_REQUIREMENTS approach.
      images:
        airflow:
          repository: alessandro-festa/fraud-airflow
          tag: "1.0.0"
          pullPolicy: IfNotPresent
          registry: ghcr.io
      dags:
        gitSync:
          enabled: true
          repo: https://github.com/alessandro-festa/aif-community-demos.git
          branch: main
          ref: main
          rev: HEAD
          depth: 1
          subPath: blueprints/fraud-detection-vllm/dags
          period: 30s
      env:
      - name: POSTGRES_URI
        value: postgresql://fraud:fraud@fraud-db:5432/fraud
      - name: MILVUS_URI
        value: http://milvus:19530
      - name: SCALE_FACTOR
        value: "0.001"
      ingress:
        apiServer:
          enabled: true
          ingressClassName: nginx
          annotations:
            nginx.ingress.kubernetes.io/ssl-redirect: "true"
          hosts:
          - name: fraud-airflow
            tls:
              enabled: true
