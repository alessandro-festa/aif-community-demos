  # ----------------------------------------------------------------------------
  # OpenCost — infra cost allocation → Prometheus, queried back from the
  # in-namespace Prometheus. We use `external` mode with the BARE service URL so we
  # don't have to hardcode the (user-chosen) AIWorkload namespace. API on :9003,
  # UI on :9090. Reachable at http://opencost:9003.
  # ----------------------------------------------------------------------------
  - chartName: opencost
    chartRepo: application-collection
    chartVersion: 2.5.27
    values:
      global:
        imagePullSecrets: [application-collection]
      opencost:
        prometheus:
          internal:
            enabled: false
          # Bare in-namespace DNS → resolves to prometheus-server in this namespace,
          # regardless of which namespace the AIWorkload is created in.
          external:
            enabled: true
            url: http://prometheus-server:80
        ui:
          enabled: true
  # ----------------------------------------------------------------------------
  # Apache Airflow — orchestrates the FinOps simulation. DAGs via git-sync.
  #   finops_setup    → teams + virtual keys + budgets in LiteLLM
  #   generate_traffic→ synthetic multi-model / multi-team chat (real token spend)
  #   backfill_history→ backdated synthetic spend into Prometheus (remote-write)
  # Uses the STOCK application-collection apache-airflow image — the DAGs only need
  # `requests` (already present) and the remote-write client is pure-stdlib
  # (see dags/common.py), so no custom image is needed.
  # ----------------------------------------------------------------------------
  - chartName: apache-airflow
    chartRepo: application-collection
    chartVersion: 1.22.0
    values:
      executor: LocalExecutor
      # Pin generated secrets so the pod template is STABLE across Fleet reconciles
      # (see fraud-detection blueprint for the rationale). Demo-fixed values.
      fernetKey: "Nv3aCd-3agJbJG1QxzKMezX5pJZB4fRpZIrqhdS-MA4="
      jwtSecret: "72873f21d1682ddc023f0815344d1cdc0157e59c9c5480bcb430686d6ed466d3"
      webserverSecretKey: "bb3ea2e3f0a3ad96a2f440ab3ca4e3406985aaf72182662ebd339f53a7a28a7a"
      redis:
        enabled: false
      flower:
        enabled: false
      dags:
        gitSync:
          enabled: true
          repo: https://github.com/alessandro-festa/aif-community-demos.git
          branch: main
          ref: main
          rev: HEAD
          depth: 1
          subPath: blueprints/finops-multimodel-vllm/dags
          period: 30s
      env:
      - name: LITELLM_BASE_URL
        value: http://litellm:4000
      - name: LITELLM_MASTER_KEY
        value: sk-guardrails-demo
      - name: PROM_REMOTE_WRITE_URL
        value: http://prometheus-server:80/api/v1/write
      - name: TRAFFIC_REQUESTS
        value: "40"
      - name: BACKFILL_DAYS
        value: "14"
      ingress:
        apiServer:
          enabled: true
          ingressClassName: nginx
          annotations:
            nginx.ingress.kubernetes.io/ssl-redirect: "true"
          hosts:
          - name: finops-airflow
            tls:
              enabled: true
