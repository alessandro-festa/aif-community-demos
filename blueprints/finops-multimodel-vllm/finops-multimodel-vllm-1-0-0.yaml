apiVersion: ai-factory.suse.com/v1alpha1
kind: Blueprint
metadata:
  labels:
    ai-factory.suse.com/blueprint-name: finops-multimodel-vllm
    ai-factory.suse.com/blueprint-version: 1.0.0
  name: finops-multimodel-vllm-1-0-0
# FinOps for a multi-model LLM gateway (vLLM, GPU).
#
# This blueprint extends the litellm-guardrails gateway into a COST-INSTRUMENTED,
# multi-model demo and reconciles the two FinOps cost planes an AI platform has:
#
#   1. TOKEN spend  — LiteLLM's OSS spend logs (per model / team / virtual key),
#      turned into real $ by per-token pricing set on each model in the proxy.
#      Surfaced to Prometheus by a small DB-reading exporter (LiteLLM's own
#      Prometheus /metrics endpoint is enterprise-gated, so we don't use it).
#   2. INFRA cost   — OpenCost allocates the $ of the inference pods (CPU / RAM /
#      PV) and exports it to Prometheus.
#
# Both planes land in Prometheus and are visualised in Grafana (a provisioned
# FinOps dashboard). Apache Airflow drives the simulation: it creates per-team
# virtual keys + budgets, fires synthetic multi-model traffic (real token
# consumption), and BACKFILLS synthetic history straight into Prometheus via the
# remote-write receiver so the dashboards show trends immediately.
#
# Chat happens in a small custom local UI (the marketplace's localFrontend) wired
# straight to LiteLLM /v1 — Open WebUI is intentionally NOT used here.
#
# Components (registry sources):
#   * vllm            — application-collection, GPU; the production-stack router
#                       serves 3 ungated Qwen sizes (different prices) on one
#                       OpenAI endpoint (vllm-router-service:80). One GPU per model.
#   * litellm         — suse-ai-registry image (arm64: upstream ghcr multi-arch);
#                       Presidio (mcr.microsoft.com) + the LiteLLM Prometheus
#                       exporter (docker.io/nicholascecere/exporter-litellm) ride
#                       along as extraResources. Bundled standalone Postgres.
#   * prometheus      — application-collection (prometheus-community chart); remote
#                       -write receiver + out-of-order ingestion ON for backfill.
#   * grafana         — application-collection; Prometheus datasource + FinOps
#                       dashboard provisioned inline.
#   * opencost        — application-collection; infra $ → Prometheus, queried back
#                       via the in-namespace Prometheus service.
#   * apache-airflow  — application-collection; DAGs via git-sync, custom image.
#
# The Blueprint Marketplace shows the reused guardrail import WIZARD (see
# marketplace.yaml): the selected guardrails are injected into the litellm
# component's proxy_config before this CR is applied.
#
# ⚠ Demo only, unsupported. Master keys / DB passwords below are placeholders.
spec:
  source: Custom  # community, unsupported demo blueprint (CRD enum has no "Community")
  displayName: FinOps Multi-Model Gateway (vLLM, GPU)
  version: 1.0.0
  description: |
    FinOps for a guarded, multi-model LLM gateway. A LiteLLM proxy serves three
    Qwen models (served by vLLM on GPU) at different per-token prices; guardrails
    (Presidio PII, secret redaction, prompt-injection) are enforced before the model.
    Two cost planes are
    reconciled in Grafana: TOKEN spend (LiteLLM OSS spend logs → a Prometheus
    exporter, per model / team / virtual key) and INFRASTRUCTURE cost (OpenCost →
    Prometheus). Apache Airflow creates per-team virtual keys + budgets, fires
    synthetic multi-model traffic, and backfills synthetic history into Prometheus
    (remote-write) so the FinOps dashboards populate immediately. Chat runs in a
    small custom local UI wired to LiteLLM.

    Prerequisites (install on the target cluster BEFORE creating an AIWorkload):
      * SUSE AI Factory operator (owns the Blueprint / AIWorkload CRDs).
      * The application-collection ClusterRepo + credentials secret (also the pull
        secret for the LiteLLM image) and the suse-ai-registry ClusterRepo. NOTE:
        OpenCost / Prometheus / Grafana require the Application Collection "Prime"
        entitlement.
      * A default StorageClass (vLLM, Postgres, Prometheus, Grafana use PVCs).
      * The NVIDIA GPU Operator + GPU node(s). The default serves 3 models = 3 GPUs
        (one per model) — trim modelSpec (and the matching litellm model_list /
        common.MODELS entries) if you have fewer GPUs.
      * cert-manager.

    Import via the Blueprint Marketplace (choose guardrails in the wizard), create
    an AIWorkload from this Blueprint in the AI Factory UI, then follow the guide:
    run the Airflow DAGs (setup → traffic → backfill), open the Grafana FinOps
    dashboards, and chat in the local UI to watch spend accrue live.
  components:
  # ----------------------------------------------------------------------------
  # vLLM (production-stack chart) — three ungated Qwen sizes served on GPU, exposed
  # through ONE OpenAI-compatible router at http://vllm-router-service:80. Different
  # sizes → the FinOps story has price variety. Each modelSpec requests 1 GPU, so
  # the default is 3 GPUs — drop modelSpec entries (and the matching litellm
  # model_list + common.MODELS entries) if you have fewer GPUs. Qwen models are
  # ungated (no HuggingFace token needed).
  # ----------------------------------------------------------------------------
  - chartName: vllm
    chartRepo: application-collection
    chartVersion: 0.1.10
    values:
      servingEngineSpec:
        runtimeClassName: nvidia
        modelSpec:
          - name: qwen25-05b
            registry: dp.apps.rancher.io
            repository: containers/vllm-openai
            tag: "0.19.0-5.29"
            modelURL: Qwen/Qwen2.5-0.5B-Instruct
            replicaCount: 1
            requestCPU: 4
            requestMemory: "8Gi"
            requestGPU: 1
            pvcStorage: "20Gi"
            vllmConfig:
              maxModelLen: 16384
              dtype: bfloat16
              gpuMemoryUtilization: 0.5
          - name: qwen25-15b
            registry: dp.apps.rancher.io
            repository: containers/vllm-openai
            tag: "0.19.0-5.29"
            modelURL: Qwen/Qwen2.5-1.5B-Instruct
            replicaCount: 1
            requestCPU: 4
            requestMemory: "12Gi"
            requestGPU: 1
            pvcStorage: "30Gi"
            vllmConfig:
              maxModelLen: 16384
              dtype: bfloat16
              gpuMemoryUtilization: 0.6
          - name: qwen25-3b
            registry: dp.apps.rancher.io
            repository: containers/vllm-openai
            tag: "0.19.0-5.29"
            modelURL: Qwen/Qwen2.5-3B-Instruct
            replicaCount: 1
            requestCPU: 6
            requestMemory: "16Gi"
            requestGPU: 1
            pvcStorage: "50Gi"
            vllmConfig:
              maxModelLen: 32768
              dtype: bfloat16
              gpuMemoryUtilization: 0.9
      routerSpec:
        enableRouter: true
        serviceType: ClusterIP
        containerPort: 8000
        servicePort: 80
  # ----------------------------------------------------------------------------
  # LiteLLM — the guarded, multi-model OpenAI-compatible gateway.
  #   * model_list carries THREE models, each with input/output cost-per-token so
  #     local models produce real $ in the spend logs (differentiated by size).
  #   * store_model_in_db: true so per-team VIRTUAL KEYS + budgets work (created by
  #     the Airflow finops_setup DAG).
  #   * guardrails: [] baseline — the marketplace wizard appends the selection.
  #   * extraResources: Presidio analyzer/anonymizer + the LiteLLM Prometheus
  #     exporter (reads this component's Postgres, exposes spend/token metrics).
  # Reachable at http://litellm:4000.
  # ----------------------------------------------------------------------------
  - chartName: litellm
    chartRepo: suse-ai-registry
    chartVersion: 1.81.13
    values:
      fullnameOverride: litellm
      # NOTE: SUSE AI litellm-database image is amd64-only. The upstream ghcr image
      # is multi-arch — use it for arm64 (Apple-silicon) clusters. On amd64, prefer
      # registry.suse.com/ai/containers/litellm-database:v1.81.13.
      image:
        registry: ghcr.io
        repository: berriai/litellm-database
        tag: main-stable
        pullPolicy: IfNotPresent
      imagePullSecrets:
      - application-collection
      masterkey: sk-guardrails-demo
      service:
        type: ClusterIP
        port: 4000
      # Bundled single-node Postgres (litellm-database image runs prisma migrations).
      # NOTE: the standalone Postgres service is named <release>-postgresql, i.e.
      # "litellm-postgresql". The exporter below points at that host — verify with
      # `kubectl -n <ns> get svc` and adjust LITELLM_DB_HOST if your release differs.
      db:
        deployStandalone: true
        database: litellm
      postgresql:
        architecture: standalone
        auth:
          username: litellm
          database: litellm
          password: ChangeMe-litellm-db-password
          postgres-password: ChangeMe-litellm-db-password
      envVars:
        PRESIDIO_ANALYZER_API_BASE: "http://presidio-analyzer:3000"
        PRESIDIO_ANONYMIZER_API_BASE: "http://presidio-anonymizer:3000"
      proxy_config:
        general_settings:
          master_key: os.environ/PROXY_MASTER_KEY
          # Persist keys/teams so virtual keys + budgets work (chargeback demo).
          store_model_in_db: true
        litellm_settings:
          drop_params: true
        # Three models at DIFFERENT prices (USD per token). These make the FinOps
        # dashboards interesting: the same tokens cost 12x more on the 3B than the
        # 0.5B. Each routes to the vLLM router by its served model name (the HF id).
        model_list:
        - model_name: qwen-0.5b
          litellm_params:
            model: hosted_vllm/Qwen/Qwen2.5-0.5B-Instruct
            api_base: http://vllm-router-service:80/v1
            input_cost_per_token: 0.00000005   # $0.05 / 1M input tokens
            output_cost_per_token: 0.0000001   # $0.10 / 1M output tokens
        - model_name: qwen-1.5b
          litellm_params:
            model: hosted_vllm/Qwen/Qwen2.5-1.5B-Instruct
            api_base: http://vllm-router-service:80/v1
            input_cost_per_token: 0.0000002    # $0.20 / 1M
            output_cost_per_token: 0.0000004   # $0.40 / 1M
        - model_name: qwen-3b
          litellm_params:
            model: hosted_vllm/Qwen/Qwen2.5-3B-Instruct
            api_base: http://vllm-router-service:80/v1
            input_cost_per_token: 0.0000006    # $0.60 / 1M
            output_cost_per_token: 0.0000012   # $1.20 / 1M
        # Baseline: no guardrails. The marketplace wizard appends entries here.
        guardrails: []
      extraResources:
      # --- Presidio PII engine (public Microsoft images; no SUSE equivalent) ---
      - apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: presidio-analyzer
          labels: {app: presidio-analyzer}
        spec:
          replicas: 1
          selector: {matchLabels: {app: presidio-analyzer}}
          template:
            metadata:
              labels: {app: presidio-analyzer}
            spec:
              containers:
              - name: presidio-analyzer
                image: mcr.microsoft.com/presidio-analyzer:2.2.362
                ports: [{containerPort: 3000}]
                readinessProbe:
                  httpGet: {path: /health, port: 3000}
                  initialDelaySeconds: 20
                  periodSeconds: 10
                resources:
                  requests: {cpu: 100m, memory: 512Mi}
      - apiVersion: v1
        kind: Service
        metadata:
          name: presidio-analyzer
          labels: {app: presidio-analyzer}
        spec:
          selector: {app: presidio-analyzer}
          ports: [{port: 3000, targetPort: 3000}]
      - apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: presidio-anonymizer
          labels: {app: presidio-anonymizer}
        spec:
          replicas: 1
          selector: {matchLabels: {app: presidio-anonymizer}}
          template:
            metadata:
              labels: {app: presidio-anonymizer}
            spec:
              containers:
              - name: presidio-anonymizer
                image: mcr.microsoft.com/presidio-anonymizer:2.2.362
                ports: [{containerPort: 3000}]
                readinessProbe:
                  httpGet: {path: /health, port: 3000}
                  initialDelaySeconds: 10
                  periodSeconds: 10
                resources:
                  requests: {cpu: 50m, memory: 128Mi}
      - apiVersion: v1
        kind: Service
        metadata:
          name: presidio-anonymizer
          labels: {app: presidio-anonymizer}
        spec:
          selector: {app: presidio-anonymizer}
          ports: [{port: 3000, targetPort: 3000}]
      # --- LiteLLM Prometheus exporter (reads the LiteLLM Postgres; OSS) ---
      # LiteLLM's native /metrics spend data is enterprise-gated, so we bridge the
      # OSS spend logs to Prometheus with this community exporter. Non-SUSE image
      # (docker.io) — the one FinOps dependency without an AppCo equivalent.
      - apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: litellm-exporter
          labels: {app: litellm-exporter}
        spec:
          replicas: 1
          selector: {matchLabels: {app: litellm-exporter}}
          template:
            metadata:
              labels: {app: litellm-exporter}
              # No prometheus.io/scrape annotation on purpose: the prometheus
              # component already scrapes this exporter via the explicit
              # `litellm-exporter` job in extraScrapeConfigs. An annotation here would
              # add a SECOND (kubernetes-pods) scrape of the same target, so every
              # litellm_* metric would be double-counted (~2x totals).
            spec:
              containers:
              - name: exporter
                image: docker.io/nicholascecere/exporter-litellm:latest
                ports: [{containerPort: 9090}]
                env:
                - {name: LITELLM_DB_HOST, value: litellm-postgresql}
                - {name: LITELLM_DB_PORT, value: "5432"}
                - {name: LITELLM_DB_NAME, value: litellm}
                - {name: LITELLM_DB_USER, value: litellm}
                - {name: LITELLM_DB_PASSWORD, value: ChangeMe-litellm-db-password}
                - {name: METRICS_PORT, value: "9090"}
                - {name: METRICS_UPDATE_INTERVAL, value: "5"}   # recompute spend often so chat shows up fast
                - {name: METRICS_SPEND_WINDOW, value: "30d"}
                readinessProbe:
                  httpGet: {path: /metrics, port: 9090}
                  initialDelaySeconds: 15
                  periodSeconds: 15
                resources:
                  requests: {cpu: 50m, memory: 128Mi}
      - apiVersion: v1
        kind: Service
        metadata:
          name: litellm-exporter
          labels: {app: litellm-exporter}
        spec:
          selector: {app: litellm-exporter}
          ports: [{name: metrics, port: 9090, targetPort: 9090}]
  # ----------------------------------------------------------------------------
  # Prometheus (prometheus-community chart) — the FinOps time-series store.
  #   * remote-write receiver + 30d out-of-order window ON so the backfill DAG can
  #     inject BACKDATED samples (instant history).
  #   * extraScrapeConfigs adds the OpenCost API and the LiteLLM exporter as jobs
  #     (bare in-namespace service DNS).
  # Server service: prometheus-server (port 80). Remote-write: /api/v1/write.
  # ----------------------------------------------------------------------------
  - chartName: prometheus
    chartRepo: application-collection
    chartVersion: 29.13.1
    values:
      global:
        imagePullSecrets: [application-collection]
      alertmanager:
        enabled: false
      prometheus-pushgateway:
        enabled: false
      # Disable node-exporter: it binds hostPort 9100 and would COLLIDE with an
      # existing cluster monitoring stack (e.g. rancher-monitoring). OpenCost doesn't
      # need it — it emits node-cost metrics itself and reads cadvisor (via the
      # kubelet) + kube-state-metrics, both of which this Prometheus still scrapes.
      prometheus-node-exporter:
        enabled: false
      # kube-state-metrics stays ON (Deployment, no hostPort) — OpenCost needs it.
      server:
        # Bare boolean flags. The chart renders each list item as a `--<flag>` arg;
        # a null-valued `extraArgs` entry is DROPPED instead (so the remote-write
        # receiver silently stayed off → 404 on /api/v1/write). `web.enable-lifecycle`
        # is the chart default for this list — repeat it or overriding the list loses it.
        extraFlags:
          - web.enable-lifecycle
          - web.enable-remote-write-receiver   # enables the /api/v1/write receiver
        # Accept samples up to 30 days old (the backfill DAG writes historical ts).
        tsdb:
          out_of_order_time_window: 30d
        retention: "30d"
        persistentVolume:
          enabled: true
          size: 12Gi
      # Scrape OpenCost (infra $) and the LiteLLM exporter (token $). Must be a
      # string (note the leading | ).
      extraScrapeConfigs: |
        - job_name: opencost
          honor_labels: true
          scrape_interval: 1m
          metrics_path: /metrics
          static_configs:
            - targets: ['opencost:9003']
        - job_name: litellm-exporter
          scrape_interval: 10s
          metrics_path: /metrics
          static_configs:
            - targets: ['litellm-exporter:9090']
  # ----------------------------------------------------------------------------
  # Grafana — Prometheus datasource + a provisioned FinOps dashboard (inline).
  # Reachable at http://grafana (service port 80). Login: admin / admin (demo).
  # ----------------------------------------------------------------------------
  - chartName: grafana
    chartRepo: application-collection
    chartVersion: 12.7.2
    values:
      global:
        imagePullSecrets: [application-collection]
      fullnameOverride: grafana
      adminUser: admin
      adminPassword: admin
      service:
        type: ClusterIP
        port: 80
      persistence:
        enabled: true
        size: 5Gi
      datasources:
        datasources.yaml:
          apiVersion: 1
          datasources:
          - name: Prometheus
            uid: prometheus
            type: prometheus
            url: http://prometheus-server
            access: proxy
            isDefault: true
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
          - name: finops
            orgId: 1
            folder: FinOps
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/finops
      # The FinOps overview dashboard (mirrors grafana/dashboards/finops-overview.json
      # in this blueprint folder). Live panels use the LiteLLM exporter metrics;
      # the history panels use finops_daily_* written by the backfill DAG.
      dashboards:
        finops:
          finops-overview:
            json: |
                {
                  "title": "FinOps \u2014 Multi-Model Gateway",
                  "uid": "finops-overview",
                  "schemaVersion": 39,
                  "editable": true,
                  "time": {
                    "from": "now-30d",
                    "to": "now"
                  },
                  "refresh": "10s",
                  "templating": {
                    "list": []
                  },
                  "panels": [
                    {
                      "type": "row",
                      "title": "Summary (live + 30-day history)",
                      "gridPos": {
                        "h": 1,
                        "w": 24,
                        "x": 0,
                        "y": 0
                      }
                    },
                    {
                      "type": "stat",
                      "title": "Total token spend (30d)",
                      "datasource": {
                        "type": "prometheus",
                        "uid": "prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "unit": "currencyUSD"
                        }
                      },
                      "gridPos": {
                        "h": 5,
                        "w": 6,
                        "x": 0,
                        "y": 1
                      },
                      "targets": [
                        {
                          "expr": "sum(sum_over_time(finops_daily_spend_usd[30d]) or litellm_total_spend)",
                          "refId": "A"
                        }
                      ]
                    },
                    {
                      "type": "stat",
                      "title": "Total tokens (30d)",
                      "datasource": {
                        "type": "prometheus",
                        "uid": "prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "unit": "short"
                        }
                      },
                      "gridPos": {
                        "h": 5,
                        "w": 6,
                        "x": 6,
                        "y": 1
                      },
                      "targets": [
                        {
                          "expr": "sum(sum_over_time(finops_daily_tokens_total[30d]) or litellm_total_tokens)",
                          "refId": "A"
                        }
                      ]
                    },
                    {
                      "type": "stat",
                      "title": "Blended cost / 1k tokens",
                      "datasource": {
                        "type": "prometheus",
                        "uid": "prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "unit": "currencyUSD",
                          "decimals": 4
                        }
                      },
                      "gridPos": {
                        "h": 5,
                        "w": 6,
                        "x": 12,
                        "y": 1
                      },
                      "targets": [
                        {
                          "expr": "sum(sum_over_time(finops_daily_spend_usd[30d]) or litellm_total_spend) / (sum(sum_over_time(finops_daily_tokens_total[30d]) or litellm_total_tokens) / 1000)",
                          "refId": "A"
                        }
                      ]
                    },
                    {
                      "type": "stat",
                      "title": "Requests (live)",
                      "datasource": {
                        "type": "prometheus",
                        "uid": "prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "unit": "short"
                        }
                      },
                      "gridPos": {
                        "h": 5,
                        "w": 6,
                        "x": 18,
                        "y": 1
                      },
                      "targets": [
                        {
                          "expr": "sum(litellm_requests_total)",
                          "refId": "A"
                        }
                      ]
                    },
                    {
                      "type": "row",
                      "title": "Spend trend (30-day backfilled history)",
                      "gridPos": {
                        "h": 1,
                        "w": 24,
                        "x": 0,
                        "y": 6
                      }
                    },
                    {
                      "type": "timeseries",
                      "title": "Spend by model (daily)",
                      "datasource": {
                        "type": "prometheus",
                        "uid": "prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "unit": "currencyUSD",
                          "custom": {
                            "drawStyle": "bars",
                            "fillOpacity": 60,
                            "stacking": {
                              "mode": "normal"
                            }
                          }
                        }
                      },
                      "gridPos": {
                        "h": 8,
                        "w": 12,
                        "x": 0,
                        "y": 7
                      },
                      "targets": [
                        {
                          "expr": "sum by (model) (last_over_time(finops_daily_spend_usd[1d]))",
                          "legendFormat": "{{model}}",
                          "refId": "A"
                        }
                      ]
                    },
                    {
                      "type": "timeseries",
                      "title": "Spend by team (daily)",
                      "datasource": {
                        "type": "prometheus",
                        "uid": "prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "unit": "currencyUSD",
                          "custom": {
                            "drawStyle": "bars",
                            "fillOpacity": 60,
                            "stacking": {
                              "mode": "normal"
                            }
                          }
                        }
                      },
                      "gridPos": {
                        "h": 8,
                        "w": 12,
                        "x": 12,
                        "y": 7
                      },
                      "targets": [
                        {
                          "expr": "sum by (team_alias) (last_over_time(finops_daily_spend_usd[1d]))",
                          "legendFormat": "{{team_alias}}",
                          "refId": "A"
                        }
                      ]
                    },
                    {
                      "type": "row",
                      "title": "Chargeback & budgets",
                      "gridPos": {
                        "h": 1,
                        "w": 24,
                        "x": 0,
                        "y": 15
                      }
                    },
                    {
                      "type": "bargauge",
                      "title": "Budget utilization by team (spend / monthly budget)",
                      "datasource": {
                        "type": "prometheus",
                        "uid": "prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "unit": "percent",
                          "min": 0,
                          "max": 100,
                          "thresholds": {
                            "steps": [
                              {
                                "color": "green",
                                "value": null
                              },
                              {
                                "color": "orange",
                                "value": 75
                              },
                              {
                                "color": "red",
                                "value": 90
                              }
                            ]
                          }
                        }
                      },
                      "gridPos": {
                        "h": 8,
                        "w": 12,
                        "x": 0,
                        "y": 16
                      },
                      "targets": [
                        {
                          "expr": "100 * sum by (team_alias) (sum_over_time(finops_daily_spend_usd[30d]) or litellm_team_spend) / max by (team_alias) (max_over_time(finops_team_budget_usd[30d]))",
                          "legendFormat": "{{team_alias}}",
                          "refId": "A"
                        }
                      ]
                    },
                    {
                      "type": "timeseries",
                      "title": "Tokens by model (daily)",
                      "datasource": {
                        "type": "prometheus",
                        "uid": "prometheus"
                      },
                      "fieldConfig": {
                        "defaults": {
                          "unit": "short",
                          "custom": {
                            "drawStyle": "bars",
                            "fillOpacity": 60,
                            "stacking": {
                              "mode": "normal"
                            }
                          }
                        }
                      },
                      "gridPos": {
